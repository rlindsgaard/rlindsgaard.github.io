---
layout: default
---
{% include JB/setup %}

{% for post in site.posts limit: 5 %}
  <div class="row">
    <div class="span14">
	    <div class="page-header">
	      <h2><a href="{{ post.url }}">{{ post.title }}</a> <small>{{ post.date | date:"%Y-%m-%d" }}</small></h2>
	    </div>
	    <div class="post_content">
	      {{ post.content }}
	    </div>
    </div>
  </div>
{% endfor %}
